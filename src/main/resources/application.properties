spring.application.name=guess
# 컨테이너/호스팅(Railway 등)에서 $PORT로 리슨
server.port=${PORT:8080}
# 개발: bootRun·템플릿 수정이 바로 보이게 (배포 시 프로필로 끄는 것 권장)
spring.thymeleaf.cache=false
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=1GB

# [ed9584/howmuch backend 브랜치] 별도 배포 URL — POST /api/backend/guess 가 여기로 프록시됨
howmuch.backend.base-url=${HOWMUCH_BACKEND_BASE_URL:}

# spring-ai vertex: add credentials later, then remove this line
spring.autoconfigure.exclude=org.springframework.ai.model.vertexai.autoconfigure.gemini.VertexAiGeminiChatAutoConfiguration
